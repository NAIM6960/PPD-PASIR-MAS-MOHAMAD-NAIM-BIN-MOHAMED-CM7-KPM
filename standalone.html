<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-DEC Mikrobotik Kelantan 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .animate-pulse-slow { animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion || { motion: (props) => <div {...props} />, AnimatePresence: (props) => <>{props.children}</> };

        // Simple Icon Component for Lucide
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [category, setCategory] = useState('rendah');
            const [scores, setScores] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);

            // Mock Data / LocalStorage Logic
            useEffect(() => {
                const savedScores = localStorage.getItem('kdec_scores');
                if (savedScores) {
                    setScores(JSON.parse(savedScores));
                } else {
                    const initialScores = [
                        { id: 1, rank: "01", team: "Cyber Knights", school: "SK Kota Bharu", status: "Selesai", score: "94.5", category: "rendah" },
                        { id: 2, rank: "02", team: "Robo-Tech", school: "SK Pasir Mas", status: "Selesai", score: "91.2", category: "rendah" },
                        { id: 3, rank: "03", team: "Micro-Bot Alpha", school: "SK Tanah Merah", status: "Selesai", score: "88.7", category: "rendah" },
                        { id: 4, rank: "04", team: "Kelantan Innovators", school: "SK Machang", status: "Penilaian", score: "--", category: "rendah" },
                        { id: 5, rank: "05", team: "Tech-Wizards", school: "SK Tumpat", status: "Menunggu", score: "--", category: "rendah" }
                    ];
                    setScores(initialScores);
                    localStorage.setItem('kdec_scores', JSON.stringify(initialScores));
                }
            }, []);

            const filteredScores = useMemo(() => {
                return scores.filter(s => s.category === category).sort((a, b) => {
                    const sA = a.score === '--' ? -1 : parseFloat(a.score);
                    const sB = b.score === '--' ? -1 : parseFloat(b.score);
                    return sB - sA;
                });
            }, [scores, category]);

            const updateScore = (id, newScore, newStatus) => {
                const updated = scores.map(s => s.id === id ? { ...s, score: newScore, status: newStatus } : s);
                setScores(updated);
                localStorage.setItem('kdec_scores', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                                <div className="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                                    <Icon name="cpu" className="text-white w-6 h-6" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl tracking-tight">K-DEC <span className="text-emerald-500">2026</span></h1>
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest font-medium">Mikrobotik Kelantan</p>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center gap-8">
                                {['home', 'leaderboard', 'jadual', 'admin'].map((tab) => (
                                    <button 
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`text-sm font-medium transition-all hover:text-emerald-400 uppercase tracking-widest ${activeTab === tab ? 'text-emerald-500' : 'text-gray-400'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow pt-32 pb-20 px-6">
                        {activeTab === 'home' && (
                            <div className="max-w-4xl mx-auto text-center space-y-12">
                                <div className="space-y-4">
                                    <span className="inline-block px-4 py-1.5 rounded-full bg-emerald-500/10 text-emerald-500 text-xs font-bold uppercase tracking-widest border border-emerald-500/20">
                                        Peringkat Negeri Kelantan
                                    </span>
                                    <h2 className="text-6xl md:text-8xl font-bold tracking-tighter leading-none">
                                        MASA DEPAN <br /> <span className="text-emerald-500">INOVASI</span> BERMULA.
                                    </h2>
                                    <p className="text-gray-400 text-lg max-w-2xl mx-auto">
                                        Pertandingan Cabaran Mikrobotik (K-DEC) 2026. Memperkasakan bakat muda dalam bidang robotik dan pengaturcaraan.
                                    </p>
                                </div>
                                <div className="flex flex-wrap justify-center gap-4">
                                    <button onClick={() => setActiveTab('leaderboard')} className="px-8 py-4 bg-emerald-500 text-black font-bold rounded-xl hover:bg-emerald-400 transition-all flex items-center gap-2">
                                        LIHAT KEPUTUSAN <Icon name="chevron-right" />
                                    </button>
                                    <button onClick={() => setActiveTab('jadual')} className="px-8 py-4 glass text-white font-bold rounded-xl hover:bg-white/10 transition-all">
                                        JADUAL PERLAWANAN
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'leaderboard' && (
                            <div className="max-w-6xl mx-auto space-y-8">
                                <div className="flex flex-col md:flex-row md:items-end justify-between gap-6">
                                    <div className="space-y-2">
                                        <h2 className="text-4xl font-bold tracking-tight">Papan <span className="text-emerald-500">Pendahulu</span></h2>
                                        <p className="text-gray-400">Keputusan terkini mengikut kategori pertandingan.</p>
                                    </div>
                                    <div className="flex p-1 bg-white/5 rounded-xl border border-white/10">
                                        <button 
                                            onClick={() => setCategory('rendah')}
                                            className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${category === 'rendah' ? 'bg-emerald-500 text-black' : 'text-gray-400 hover:text-white'}`}
                                        >
                                            SR (RENDAH)
                                        </button>
                                        <button 
                                            onClick={() => setCategory('menengah')}
                                            className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${category === 'menengah' ? 'bg-emerald-500 text-black' : 'text-gray-400 hover:text-white'}`}
                                        >
                                            SM (MENENGAH)
                                        </button>
                                    </div>
                                </div>

                                <div className="glass rounded-2xl overflow-hidden border border-white/10">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-white/5 border-b border-white/10">
                                                <th className="px-6 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Ked</th>
                                                <th className="px-6 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Pasukan</th>
                                                <th className="px-6 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Sekolah</th>
                                                <th className="px-6 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Status</th>
                                                <th className="px-6 py-4 text-xs font-bold uppercase tracking-widest text-gray-400 text-right">Skor</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredScores.map((row, idx) => (
                                                <tr key={row.id} className="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                                                    <td className="px-6 py-6 font-mono text-emerald-500 font-bold">{String(idx + 1).padStart(2, '0')}</td>
                                                    <td className="px-6 py-6 font-bold">{row.team}</td>
                                                    <td className="px-6 py-6 text-gray-400 text-sm">{row.school}</td>
                                                    <td className="px-6 py-6">
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border ${
                                                            row.status === 'Selesai' ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20' :
                                                            row.status === 'Penilaian' ? 'bg-amber-500/10 text-amber-500 border-amber-500/20' :
                                                            'bg-gray-500/10 text-gray-400 border-gray-500/20'
                                                        }`}>
                                                            {row.status}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-6 text-right font-mono text-xl font-bold text-emerald-400">{row.score}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'jadual' && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <h2 className="text-4xl font-bold tracking-tight">Jadual <span className="text-emerald-500">Pertandingan</span></h2>
                                <div className="space-y-4">
                                    {[
                                        { time: "08:30 AM", event: "Pendaftaran & Taklimat Peserta", loc: "Dewan Utama" },
                                        { time: "09:30 AM", event: "Pusingan Kelayakan (SR)", loc: "Arena A" },
                                        { time: "11:00 AM", event: "Pusingan Kelayakan (SM)", loc: "Arena B" },
                                        { time: "02:00 PM", event: "Pusingan Akhir & Penutup", loc: "Dewan Utama" }
                                    ].map((item, i) => (
                                        <div key={i} className="glass p-6 rounded-2xl flex items-center justify-between border border-white/10">
                                            <div className="flex items-center gap-6">
                                                <div className="text-emerald-500 font-mono font-bold text-lg">{item.time}</div>
                                                <div>
                                                    <div className="font-bold text-lg">{item.event}</div>
                                                    <div className="text-gray-400 text-sm">{item.loc}</div>
                                                </div>
                                            </div>
                                            <Icon name="clock" className="text-white/20" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-4xl font-bold tracking-tight">Panel <span className="text-emerald-500">Admin</span></h2>
                                    <button onClick={() => setIsAdmin(!isAdmin)} className="px-4 py-2 glass rounded-lg text-xs font-bold uppercase tracking-widest">
                                        {isAdmin ? 'Logout' : 'Login'}
                                    </button>
                                </div>
                                
                                {isAdmin ? (
                                    <div className="space-y-4">
                                        {scores.map(s => (
                                            <div key={s.id} className="glass p-6 rounded-2xl flex flex-wrap items-center justify-between gap-4 border border-white/10">
                                                <div>
                                                    <div className="font-bold">{s.team}</div>
                                                    <div className="text-xs text-gray-400 uppercase tracking-widest">{s.category}</div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <select 
                                                        value={s.status} 
                                                        onChange={(e) => updateScore(s.id, s.score, e.target.value)}
                                                        className="bg-black border border-white/10 rounded-lg px-3 py-2 text-sm"
                                                    >
                                                        <option>Menunggu</option>
                                                        <option>Penilaian</option>
                                                        <option>Selesai</option>
                                                    </select>
                                                    <input 
                                                        type="text" 
                                                        value={s.score} 
                                                        onChange={(e) => updateScore(s.id, e.target.value, s.status)}
                                                        className="bg-black border border-white/10 rounded-lg px-3 py-2 text-sm w-20 text-center font-mono"
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="glass p-12 rounded-3xl text-center space-y-6 border border-white/10">
                                        <Icon name="settings" className="w-12 h-12 mx-auto text-emerald-500" />
                                        <p className="text-gray-400">Sila log masuk untuk mengemaskini skor pertandingan.</p>
                                        <button onClick={() => setIsAdmin(true)} className="px-8 py-3 bg-emerald-500 text-black font-bold rounded-xl">LOG MASUK</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="py-12 px-6 border-t border-white/10 mt-auto">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <h3 className="font-bold text-lg">K-DEC <span className="text-emerald-500">2026</span></h3>
                                <p className="text-xs text-gray-500 uppercase tracking-widest">USTP Pasir Mas, Kelantan</p>
                            </div>
                            <div className="text-center text-xs text-gray-500">
                                &copy; 2026 Pertandingan Cabaran Mikrobotik (K-DEC) Kelantan. Hak Cipta Terpelihara.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
